[workbench]
image=docker.io/library/alpine:latest
pull=true
replace=true
additional_packages="git git-gitk vim tree usbutils"
init_hooks="rm /usr/bin/vi; ln -s /usr/bin/vim /usr/bin/vi"
exported_bins="/usr/bin/git /usr/bin/gitk /usr/bin/vi /usr/bin/lsusb /usr/bin/tree /usr/bin/vi"
exported_bins_path="$HOME/.local/bin"
