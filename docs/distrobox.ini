[inkcutBox]
image=docker.io/library/alpine:3
home=$HOME/distrobox/inkcutBox
additional_packages="gcc git cups-dev musl-dev linux-headers"
additional_packages="python3-dev pipx py3-qt5"
additional_flags="--env PIPX_BIN_DIR=/usr/local/bin"
exported_bins="/usr/bin/pipx"
exported_bins_path="$HOME/.local/bin"
pull=true

[tinygo]
name=tinygo
image=ghcr.io/tinygo-org/tinygo:0.41.1
exported_bins="/usr/local/tinygo/bin/tinygo /usr/local/go/bin/go"
exported_bins_path="$HOME/.local/bin"
pull=true
replace=true

[utilsMuController]
name=utilsMuController
image=debian:stable-slim
additional_packages="esptool bossa-cli openocd tio"
exported_bins="/usr/bin/tio /usr/bin/openocd /usr/bin/esptool /usr/bin/bossac"
exported_bins_path="$HOME/.local/bin"
pull=true
replace=true

[workbench]
image=docker.io/library/alpine:latest
additional_packages="git gitg vim tree usbutils"
init_hooks="rm /usr/bin/vi; ln -s /usr/bin/vim /usr/bin/vi"
exported_bins="/usr/bin/git /usr/bin/gitg /usr/bin/vi /usr/bin/lsusb /usr/bin/tree /usr/bin/vi"
exported_bins_path="$HOME/.local/bin"
pull=true
replace=true